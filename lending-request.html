<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPEI - Interlibrary Lending Request</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f7; padding: 20px; }
        .form-container { background: #fff; padding: 30px; border-radius: 8px; max-width: 650px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .help-text { font-size: 0.85em; color: #666; margin-top: 3px;}
        button { background-color: #006b3f; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:disabled { background-color: #999; }
        #success-msg { display: none; background: #d4edda; color: #155724; padding: 15px; border-radius: 4px; margin-top: 20px; text-align: center; font-weight: bold;}
        h2 { color: #006b3f; border-bottom: 2px solid #006b3f; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Lending Request Form</h2>
    <p>Please use this form to request a loan or scan from UPEI Library collections.</p>
    
    <form id="lending-form">
        <!-- Bibliographic Info -->
        <div class="form-group">
            <label for="doi_isbn">DOI or ISBN (Auto-lookup)</label>
            <input type="text" id="doi_isbn" placeholder="e.g., 978-0465050659">
        </div>

        <div class="form-group">
            <label for="title">Item Title *</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label for="author">Author/Editor *</label>
            <input type="text" id="author" required>
        </div>

        <div class="form-group">
            <label for="call_number">UPEI Call Number (Optional)</label>
            <input type="text" id="call_number" placeholder="e.g., LB 2395 .C12">
        </div>

        <hr>

        <div class="form-group">
            <label for="inst_name">Requesting Institution Name *</label>
            <input type="text" id="inst_name" placeholder="e.g., Dalhousie University" required>
        </div>

        <div class="form-group">
            <label for="inst_email">ILL Dept. Contact Email *</label>
            <input type="email" id="inst_email" required>
        </div>

        <div class="form-group">
            <label for="shipping_address">Full Shipping Address *</label>
            <textarea id="shipping_address" rows="3" placeholder="Include department, building, and postal code" required></textarea>
        </div>

        <div class="form-group">
            <label for="notes">Special Instructions / OCLC Number</label>
            <textarea id="notes" rows="2"></textarea>
        </div>

        <button type="submit" id="submit-btn">Submit Lending Request</button>
    </form>

    <div id="success-msg">Request submitted. The UPEI ILL team will process this shortly.</div>
</div>

<script>

document.getElementById('doi_isbn').addEventListener('blur', async function() {
  const val = this.value.trim();
  if (!val) return;
  if (val.startsWith('10.')) {
    const url = `https://api.crossref.org/works/${encodeURIComponent(val)}`;
    try {
      const res  = await fetch(url, { headers: { 'User-Agent': 'UPEI-ILL/1.0 (ill@upei.ca)' } });
      const data = await res.json();
      document.getElementById('title').value  = data.message.title?.[0] ?? '';
      document.getElementById('author').value = data.message.author?.map(a => `${a.family}, ${a.given}`).join('; ') ?? '';
    } catch (e) { console.error(e); }
  } else {
    const isbn = val.replace(/[^0-9X]/gi, '');
    const url  = `https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      const book = data[`ISBN:${isbn}`];
      if (book) {
        document.getElementById('title').value  = book.title ?? '';
        document.getElementById('author').value = book.authors?.map(a => a.name).join('; ') ?? '';
      }
    } catch (e) { console.error(e); }
  }
});


document.getElementById('lending-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  

  const WEBHOOK_URL = ''; 

  const payload = {
    title:         document.getElementById('title').value.trim(),
    author:        document.getElementById('author').value.trim(),
    callNumber:    document.getElementById('call_number').value.trim(),
    instName:      document.getElementById('inst_name').value.trim(),
    instEmail:     document.getElementById('inst_email').value.trim(),
    shippingAddr:  document.getElementById('shipping_address').value.trim(),
    notes:         document.getElementById('notes').value.trim()
  };

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      document.getElementById('success-msg').style.display = 'block';
      this.reset();
    } else { alert('Submission failed. Check Webhook URL.'); }
  } catch (err) { alert('Network error.'); }
  finally {
    btn.disabled = false;
    btn.textContent = 'Submit Lending Request';
  }
});
</script>
</body>
</html>
